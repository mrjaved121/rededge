name: rededge
description: "RED EDGE Installation Management Flutter App - Production-Ready, Offline-First, Field-Optimised"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Local Database
  hive_flutter: ^1.1.0

  # HTTP Client
  dio: ^5.4.3
  dio_smart_retry: ^5.1.0

  # Network Connectivity
  connectivity_plus: ^6.0.3

  # Camera & Gallery
  camera: ^0.11.0
  image_picker: ^1.0.7

  # GPS & Location
  geolocator: ^12.0.0

  # Storage & Security
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.0.0

  # UI Polish
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.0

  # Background Tasks
  workmanager: ^0.5.2

  # Permissions
  permission_handler: ^11.3.1

  # Dependency Injection
  get_it: ^8.0.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Error Handling
  dartz: ^0.10.1

  # Code Generation Support
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  # Fonts
  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700

  # Assets (images, logos, etc)
  assets:
    - assets/images/
    - assets/icons/

